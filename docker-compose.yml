services:
  backend:
    build: ./backend
    container_name: kicad-prism-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount projects directory for persistence
      - ./data/projects:/app/projects
      # Mount SSH directory for Git persistence (GitLab/GitHub SSH)
      - ./data/ssh:/root/.ssh:rw
    environment:
      - PYTHONUNBUFFERED=1
      # Root directory for storing projects
      - KICAD_PROJECTS_ROOT=/app/projects
      # Friendly workspace name shown on login page
      - WORKSPACE_NAME=${WORKSPACE_NAME:-KiCAD Prism}
      # Authentication provider selection
      - AUTH_PROVIDER=${AUTH_PROVIDER:-google}
      # Google OAuth Configuration (required when AUTH_PROVIDER=google)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Local auth bootstrap admin (required on first run when AUTH_PROVIDER=local)
      - LOCAL_BOOTSTRAP_ADMIN_USERNAME=${LOCAL_BOOTSTRAP_ADMIN_USERNAME:-}
      - LOCAL_BOOTSTRAP_ADMIN_PASSWORD=${LOCAL_BOOTSTRAP_ADMIN_PASSWORD:-}
      - LOCAL_BOOTSTRAP_ADMIN_NAME=${LOCAL_BOOTSTRAP_ADMIN_NAME:-Workspace Admin}
      - ALLOWED_USERS_STR=${ALLOWED_USERS_STR:-}
      - ALLOWED_DOMAINS_STR=${ALLOWED_DOMAINS_STR:-}
      - BOOTSTRAP_ADMIN_USERS_STR=${BOOTSTRAP_ADMIN_USERS_STR:-}
      - ROLE_STORE_PATH=${ROLE_STORE_PATH:-}
      - LOCAL_ACCOUNT_STORE_PATH=${LOCAL_ACCOUNT_STORE_PATH:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-12}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      # Set to false to disable authentication entirely
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      # Development mode (set to false for production/bundling)
      - DEV_MODE=false
      # GitHub Token for private repository access (optional)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

  frontend:
    build: ./frontend
    container_name: kicad-prism-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
