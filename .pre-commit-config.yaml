repos:
  # ── Python (backend) ────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        name: Ruff lint (backend)
        args: [--config, backend/ruff.toml]
        files: ^backend/

      - id: ruff-format
        name: Ruff format (backend)
        args: [--config, backend/ruff.toml]
        files: ^backend/

  # ── Commit message ──────────────────────────────────────────────────────────
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        name: Commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/config-conventional"

  # ── Frontend (TypeScript/React) ─────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (frontend)
        language: node
        entry: ./frontend/node_modules/.bin/eslint
        args: [--max-warnings=0]
        files: ^frontend/src/.*\.[tj]sx?$
        pass_filenames: true

  # ── General hygiene ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/
      - id: end-of-file-fixer
        exclude: ^frontend/
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/.*\.json$   # frontend has generated/large JSON
      - id: check-merge-conflict
      - id: detect-private-key
