name: PR Checks

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose*.yml"
      - ".github/workflows/pr-checks.yml"
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

permissions:
  contents: read

# ── Build ──────────────────────────────────────────────────────────────────────

jobs:
  build-backend:
    name: Build / Backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          platforms: linux/amd64
          build-args: TARGETARCH=amd64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build / Frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

# ── Code quality ───────────────────────────────────────────────────────────────

  commit-lint:
    name: Quality / Commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        uses: commitlint/github-action@v6
        with:
          configFile: .commitlintrc.yml
          firstParent: true

  lint-frontend:
    name: Quality / Frontend lint & types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --include=dev

      - name: Type-check (via build)
        run: npm run build

      - name: ESLint
        run: npx eslint src --max-warnings=0 || true

# ── Security ───────────────────────────────────────────────────────────────────

  bandit:
    name: Security / Python static analysis (Bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install bandit[sarif]

      - name: Run Bandit
        run: bandit -r backend/app -f sarif -o bandit-results.sarif --severity-level medium || true

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  security-deps-backend:
    name: Security / Python dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install pip-audit

      - name: pip-audit
        run: pip-audit -r requirements.txt

  security-deps-frontend:
    name: Security / npm dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --include=dev

      - name: Filter to production deps and audit
        run: |
          npm audit --omit=dev --json > npm-audit-raw.json 2>/dev/null || true
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('npm-audit-raw.json', 'utf8');
            let results;
            try { results = JSON.parse(raw); } catch { results = { vulnerabilities: {} }; }
            const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
            const prodDeps = new Set();
            for (const [path, info] of Object.entries(lock.packages || {})) {
              if (path && !info.dev && !info.devOptional)
                prodDeps.add(path.split('node_modules/').pop());
            }
            const vulns = results.vulnerabilities || {};
            const filtered = Object.fromEntries(
              Object.entries(vulns).filter(([name]) => prodDeps.has(name))
            );
            const count = Object.keys(filtered).length;
            console.log(count > 0
              ? count + ' production vulnerabilities found'
              : 'No production vulnerabilities (filtered ' + Object.keys(vulns).length + ' npm-internal entries)');
            if (count > 0) {
              console.log(JSON.stringify(filtered, null, 2));
              process.exit(1);
            }
          "

  trivy-image:
    name: Security / Container image scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build-frontend]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Rebuild frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: kicad-prism-frontend:pr
          cache-from: type=gha,scope=frontend

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: kicad-prism-frontend:pr
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.69.1

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  trivy-config:
    name: Security / Config scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan Dockerfiles & docker-compose (config mode)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM
          version: v0.69.1

      - name: Upload config scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-config.sarif') != ''
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
